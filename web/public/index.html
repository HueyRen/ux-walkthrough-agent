<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UX 体验走查</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d0d0d0;
      border-radius: 10px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="url"],
    select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #d0d0d0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: #333;
      background: #fff;
      transition: border-color 0.15s;
      outline: none;
    }

    textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #d0d0d0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: #333;
      background: #fff;
      transition: border-color 0.15s;
      outline: none;
      resize: vertical;
      min-height: 60px;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    select:focus,
    textarea:focus {
      border-color: #4a90d9;
    }

    textarea::placeholder {
      color: #aaa;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      margin-top: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #eee;
    }

    input::placeholder {
      color: #aaa;
    }

    small {
      display: block;
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }

    .persona-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }

    .chip {
      padding: 6px 14px;
      border: 1.5px solid #d0d0d0;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      transition: all 0.15s;
      color: #555;
      font-family: inherit;
    }

    .chip:hover {
      border-color: #aac4ef;
    }

    .chip.selected {
      background: #e8f0fe;
      border-color: #4a90d9;
      color: #1a73e8;
    }

    .chip-hint {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .submit-btn:hover {
      background: #1558c0;
    }

    .submit-btn:disabled {
      background: #a0c0f0;
      cursor: not-allowed;
    }

    .error-msg {
      font-size: 13px;
      color: #dc3545;
      margin-top: 10px;
      display: none;
    }

    .footer-links {
      margin-top: 20px;
      text-align: center;
    }

    .footer-links a {
      font-size: 13px;
      color: #1a73e8;
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 560px) {
      .card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>UX 体验走查</h1>
    <p class="subtitle">提交一个走查任务，AI 自动执行并生成 HTML 报告</p>

    <form id="walkthrough-form">
      <div class="form-group">
        <label for="url">目标网站 URL</label>
        <input
          type="text"
          id="url"
          name="url"
          placeholder="example.com"
          required
        >
        <small>输入任何公开网站的 URL</small>
      </div>

      <p class="section-label">研究目标</p>

      <div class="form-group">
        <label for="business_question">业务问题</label>
        <textarea
          id="business_question"
          name="business_question"
          placeholder="这次测试要回答什么业务问题？"
          rows="2"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="research_question">研究问题</label>
        <textarea
          id="research_question"
          name="research_question"
          placeholder="转化为可观察的研究问题"
          rows="2"
        ></textarea>
      </div>

      <p class="section-label">测试范围</p>

      <div class="form-group">
        <label for="user_goal">用户目标</label>
        <textarea
          id="user_goal"
          name="user_goal"
          placeholder="用户要完成什么任务？例如：找到一款符合预算的蓝牙耳机并发起询盘"
          rows="2"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="in_scope">In Scope</label>
        <textarea
          id="in_scope"
          name="in_scope"
          placeholder="具体哪些 flow / feature"
          rows="2"
        ></textarea>
      </div>

      <div class="form-group">
        <label>选择用户画像 <span style="font-weight:400;color:#999">（可多选）</span></label>
        <div class="persona-chips">
          <button type="button" class="chip selected" data-persona="new_user">New User（新用户）</button>
          <button type="button" class="chip" data-persona="experienced_user">Experienced（资深用户）</button>
          <button type="button" class="chip" data-persona="mobile_user">Mobile（移动端）</button>
          <button type="button" class="chip" data-persona="accessibility_user">Accessibility（无障碍）</button>
          <button type="button" class="chip" data-persona="custom" id="custom-chip">+ 自定义</button>
        </div>
        <p class="chip-hint">至少选择一个用户画像</p>
        <textarea
          id="custom_persona"
          name="custom_persona"
          placeholder="描述自定义画像：角色、背景、采购目标、关注点…"
          rows="3"
          style="display:none; margin-top:10px;"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="rules">评估规则集</label>
        <select id="rules" name="rules">
          <option value="general">通用 UX 规则</option>
          <option value="ecommerce">电商规则</option>
          <option value="saas">SaaS / Web App 规则</option>
          <option value="content">内容型网站规则</option>
        </select>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">开始走查 →</button>
      <p class="error-msg" id="error-msg"></p>
    </form>

    <div class="footer-links">
      <a href="/jobs">查看走查历史 →</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/app.js"></script>
  <script>
    let supabaseClient = null;
    let session = null;

    const chips = document.querySelectorAll('.chip');
    const form = document.getElementById('walkthrough-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');
    const customTextarea = document.getElementById('custom_persona');

    // Auth UI
    const authSection = document.createElement('div');
    authSection.id = 'auth-section';
    authSection.innerHTML = `
      <div class="form-group">
        <label for="auth-email">登录邮箱</label>
        <input type="text" id="auth-email" placeholder="your@email.com">
      </div>
      <button type="button" class="submit-btn" id="auth-btn">发送登录链接</button>
      <p class="error-msg" id="auth-error" style="display:none"></p>
      <p style="font-size:12px;color:#999;margin-top:8px;text-align:center">
        首次使用？输入邮箱即可注册
      </p>
    `;

    async function initAuth() {
      // Auth verification disabled — show form directly
      session = { skip: true };
      showForm();
    }

    function showAuth() {
      form.style.display = 'none';
      const card = document.querySelector('.card');
      if (!document.getElementById('auth-section')) {
        card.insertBefore(authSection, form);
      }
      authSection.style.display = 'block';

      document.getElementById('auth-btn').addEventListener('click', async () => {
        const email = document.getElementById('auth-email').value.trim();
        const authError = document.getElementById('auth-error');
        if (!email) {
          authError.textContent = '请输入邮箱';
          authError.style.display = 'block';
          return;
        }
        const btn = document.getElementById('auth-btn');
        btn.disabled = true;
        btn.textContent = '发送中...';
        authError.style.display = 'none';

        const { error } = await supabaseClient.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: window.location.origin }
        });

        if (error) {
          authError.textContent = error.message;
          authError.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '发送登录链接';
        } else {
          btn.textContent = '已发送，请查收邮箱';
        }
      });
    }

    function showForm() {
      if (document.getElementById('auth-section')) {
        authSection.style.display = 'none';
      }
      form.style.display = 'block';
    }

    // Chip toggle behavior
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        const isSelected = chip.classList.contains('selected');
        const selectedCount = document.querySelectorAll('.chip.selected').length;

        // Prevent deselecting the last chip
        if (isSelected && selectedCount === 1) return;

        chip.classList.toggle('selected');

        // Show/hide custom persona textarea
        if (chip.dataset.persona === 'custom') {
          customTextarea.style.display = chip.classList.contains('selected') ? '' : 'none';
          if (!chip.classList.contains('selected')) customTextarea.value = '';
        }
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      if (!session) {
        errorMsg.textContent = '请先登录';
        errorMsg.style.display = 'block';
        return;
      }

      let url = document.getElementById('url').value.trim();
      if (url && !/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
        document.getElementById('url').value = url;
      }
      const rules = document.getElementById('rules').value;
      const personas = Array.from(document.querySelectorAll('.chip.selected'))
        .map(c => c.dataset.persona);

      const business_question = document.getElementById('business_question').value.trim();
      const research_question = document.getElementById('research_question').value.trim();
      const success_metrics = '';
      const user_goal = document.getElementById('user_goal').value.trim();
      const in_scope = document.getElementById('in_scope').value.trim();
      const custom_persona = document.getElementById('custom_persona').value.trim();

      if (personas.length === 0) {
        errorMsg.textContent = '请至少选择一个用户画像';
        errorMsg.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';

      try {
        const headers = { 'Content-Type': 'application/json' };
        if (session && session.access_token) {
          headers['Authorization'] = `Bearer ${session.access_token}`;
        }
        const res = await fetch('/jobs', {
          method: 'POST',
          headers,
          body: JSON.stringify({
            url, personas, rules,
            business_question, research_question, success_metrics,
            user_goal, in_scope, custom_persona,
          })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `服务器错误 (${res.status})`);
        }

        const { jobId } = await res.json();
        window.location.href = `/jobs/${jobId}`;
      } catch (err) {
        errorMsg.textContent = err.message || '提交失败，请重试';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '开始走查 →';
      }
    });

    initAuth();
  </script>
</body>
</html>
